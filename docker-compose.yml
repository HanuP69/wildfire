version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./src:/app/src
    environment:
      - MODEL_DIR=/app/models
      - FIRMS_API_KEY=YOUR_NASA_FIRMS_API_KEY
    command: pdm run api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: .
    ports:
      - "7860:7860"
    volumes:
      - ./src:/app/src
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    command: pdm run ui
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000
    volumes:
      - ./mlruns:/mlflow/mlruns
    restart: unless-stopped